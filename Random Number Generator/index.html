<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Number Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="section-1">
      <div class="number-container">
        <div class="content">
          <p class="paraa">Random Number Generator</p>
          <hr />
          <div class="min-max">
            <div>
              <span>Min:</span>
              <input type="number" id="Min-number" class="min-number" />
            </div>
            <div>
              <span>Max:</span>
              <input type="number" id="Max-number" class="max-number" />
            </div>
          </div>
          <hr />
          <div>
            <button class="generate-number" id="generate-button">
              Generate Number
            </button>
          </div>
          <hr />
          <div class="random-nmb">
            <div><p class="r-txt">Random Number:</p></div>
            <span class="randomnumbe" id="rnd-display">0</span>
          </div>
        </div>
      </div>
    </section>

    <script src="index.js"></script>
  </body>
</html>
