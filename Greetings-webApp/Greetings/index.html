<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section>
      <div class="app-container">
        <div class="app-structured">

        </div>
      </div>
    </section>
    <script src="index.js"></script>
