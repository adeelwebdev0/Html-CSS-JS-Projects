<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section>
      <div class="card-container">
        <div class="card-structure">
          <img src="image/Profile-pic.jpg" class="prof-pic" />
          <h2>John Doe</h2>
          <p class="pp">Web Developer</p>

          <hr />
          <p class="detail">
            Passionate coder and tech enthusiat. <br />
            Love to build amazing web experiences.
          </p>

          <div class="img-container">
            <img src="image/Facebook-icon.png" class="fb-icon" />
            <img src="image/Instagram-icon.png" class="twitter-icon" />
            <img src="image/Twitter-icon.png" class="insta-icon" />
          </div>

          <div>
            <button class="Follow-btn" id="button">Follow</button>
          </div>
        </div>
      </div>
    </section>
    <script src="index.js"></script>
  </body>
</html>
