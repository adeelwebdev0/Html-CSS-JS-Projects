<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backgorund Color Changer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="container">
      <div class="structure">
        <div class="container">
          <p class="para">Background Color Changer!</p>
          <div class="bgc-structure">
            <div>
              <p>Click the buttons below to change the background color!</p>
            </div>
            <div class="btn-container">
              <button class="Red" id="red">Red</button>
              <button class="Green" id="green">Green</button>
              <button class="Blue" id="blue">Blue</button>
              <button class="Yellow" id="yellow">Yellow</button>
              <button class="Reset" id="reset">Reset</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="index.js"></script>
  </body>
</html>
